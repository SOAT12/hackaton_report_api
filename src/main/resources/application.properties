spring.application.name=hackaton-report-api
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/report_db}
spring.data.mongodb.auto-index-creation=true

server.port=8080

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:local-bucket}
aws.s3.base-url=${AWS_S3_BASE_URL:http://localhost:4566/local-bucket}
aws.sqs.status-update-queue-url=${AWS_SQS_STATUS_UPDATE_QUEUE_URL:https://sqs.us-east-1.amazonaws.com/481824691194/diagram-process}

app.base-url=${APP_BASE_URL:http://localhost:8080}
