version: '3.8'

services:
  report-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/report_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - report-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - report-network

volumes:
  mongo-data:

networks:
  report-network:
    driver: bridge
